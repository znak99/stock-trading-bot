name: us_stock
market_type: global_equity
currency: USD
timezone: America/New_York

supported_exchanges:
  - NASDAQ
  - NYSE
  - AMEX

trading_calendar:
  regular_open: "09:30"
  regular_close: "16:00"
  session_phases:
    - PRE_MARKET
    - INTRADAY_MONITOR
    - MARKET_CLOSE_PROCESS
    - NEXT_OPEN_EXECUTION

order_rules:
  lot_size: 1
  tick_size_policy: us_equity
  supported_order_types:
    - market
    - limit
  price_limit_guard_enabled: false

instrument_defaults:
  asset_type: equity
  sector: unknown
  is_etf: false
  is_active: true
