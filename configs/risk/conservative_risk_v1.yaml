name: conservative_risk_v1
allocation_policy: weighted_score

risk_checks:
  max_active_positions: 5
  max_position_ratio: 0.20
  max_single_order_ratio: 0.20
  block_duplicate_long_entry: true
  min_available_cash_after_order: 0

reservation:
  use_reserved_cash: true
  use_reserved_sell_quantity: true

weighted_allocation:
  min_position_ratio: 0.08
  score_floor: 0.45
  score_ceiling: 0.90
  fallback_position_ratio: 0.20

operational_safety:
  enabled: true
  daily_loss_limit_rate: 0.03
  block_duplicate_active_orders: true
  halt_on_abnormal_state: true
  allow_exit_orders_during_daily_loss_block: true
  abnormal_state_checks:
    detect_negative_cash_balance: true
    detect_available_cash_inconsistency: true
    detect_reserved_cash_exceeds_cash_balance: true
    detect_negative_position_quantity: true
    detect_active_position_limit_breach: true
