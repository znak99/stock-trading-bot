mode: backtest
broker_mode: backtest

application:
  dry_run: true
  enable_event_replay: true

backtest:
  initial_cash_balance: 10000000
  benchmark_symbol: KOSDAQ
  historical_data_provider: historical_market_data_feed
  broker_adapter: simulated_broker
  start_date: "2024-01-01"
  end_date: "2024-12-31"
  preload_calendar: true
  fill_orders_on_next_open: true
  persist_results: true
  result_path: data/results/backtest

